<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node-Based Chat Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="api-key-modal">
        <div class="modal-content">
            <h2>OpenAI API Key Required</h2>
            <p>Please enter your OpenAI API key to use this chat interface. Your key will be stored locally in your browser.</p>
            <input type="password" id="api-key-input" placeholder="sk-...">
            <button onclick="saveApiKey()">Save & Continue</button>
        </div>
    </div>

    <div id="background-dots"></div>
    
    <div id="canvas-container">
        <svg id="connections-svg"></svg>
    </div>

    <div class="zoom-indicator">Zoom: <span id="zoom-level">100</span>%</div>

    <script src="script.js"></script>
</body>
</html>
